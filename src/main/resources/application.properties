spring.application.name=nexusai-gateway
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant


gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
gemini.model=gemini-2.5-flash

# Priority Routing Model Configurations
routing.model.high.provider=gemini
routing.model.high.name=gemini-2.5-flash

routing.model.medium.provider=groq
routing.model.medium.name=llama-3.3-70b-versatile

routing.model.low.provider=groq
routing.model.low.name=llama-3.1-8b-instant

# Resilience4j Circuit Breaker configuration for Gemini
resilience4j.circuitbreaker.instances.gemini.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.gemini.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.gemini.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.gemini.sliding-window-size=5
resilience4j.circuitbreaker.instances.gemini.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.gemini.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.gemini.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j Circuit Breaker configuration for Groq
resilience4j.circuitbreaker.instances.groq.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.groq.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.groq.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.groq.sliding-window-size=5
resilience4j.circuitbreaker.instances.groq.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.groq.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.groq.automatic-transition-from-open-to-half-open-enabled=true

# Database Configuration (H2 in-memory default for easy local running)
spring.datasource.url=jdbc:h2:mem:nexusdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# PostgreSQL Configuration (Uncomment to switch from H2)
# spring.datasource.url=jdbc:postgresql://localhost:5432/nexusai
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# OpenAI API configuration
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini

# Anthropic Claude API configuration
claude.api.key=${CLAUDE_API_KEY:}
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-3-5-haiku-latest

# Ollama local configuration
ollama.api.url=http://localhost:11434/v1/chat/completions
ollama.model=llama3

# Toggle to automatically mock providers if their API keys are not set/paid
gateway.mock-missing-providers=true

# Redis Connection Configurations
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Rate Limiter Configuration Settings
# Selectable Algorithms: TOKEN_BUCKET, SLIDING_WINDOW, LEAKY_BUCKET
gateway.rate-limiter.algorithm=TOKEN_BUCKET
gateway.rate-limiter.user.limit=5
gateway.rate-limiter.tenant.limit=20
gateway.rate-limiter.provider.gemini.limit=15
gateway.rate-limiter.provider.groq.limit=30
gateway.rate-limiter.provider.openai.limit=20
gateway.rate-limiter.provider.claude.limit=20
gateway.rate-limiter.provider.ollama.limit=100

# Spring Boot Actuator & Prometheus Observability Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
